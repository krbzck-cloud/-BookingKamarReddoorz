<form id="bookingForm">
    <label>Nama Lengkap</label>
    <input type="text" id="name" placeholder="Nama sesuai KTP" required>

    <!-- TAMBAHAN BARU: NOMOR HP & EMAIL -->
    <div class="row">
        <div>
            <label>Nomor HP/WhatsApp</label>
            <input type="tel" id="cust_phone" placeholder="Contoh: 08123456789" required>
        </div>
        <div>
            <label>Email</label>
            <input type="email" id="cust_email" placeholder="alamat@email.com" required>
        </div>
    </div>

    <label>Nama Hotel / Kota</label>
    <input type="text" id="hotel" placeholder="Contoh: RedDoorz Near Malioboro" required>

    <div class="row">
        <div>
            <label>Check In</label>
            <input type="date" id="checkin" required>
        </div>
        <div>
            <label>Check Out</label>
            <input type="date" id="checkout" required>
        </div>
    </div>

    <label>Catatan (Opsional)</label>
    <textarea id="note" rows="2" placeholder="Contoh: Double bed, lantai atas..."></textarea>

    <button type="submit" id="btnWa">PESAN VIA WHATSAPP</button>
</form>
