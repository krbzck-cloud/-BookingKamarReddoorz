<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Hotel</title>
    <meta ="og:title" content="Booking Hotel RedDoorZ">
<meta property="og:description" content="Booking hotel mudah melalui WhatsApp.">
<meta property="og:image" content="https://krbzck-cloud.github.io/-BookingKamarReddoorz/promo.jpg">
<meta property="og:url" content="https://krbzck-cloud.github.io/-BookingKamarReddoorz/">
<meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">

<div class="container">

<div class="logo">
Booking Hotel
</div>

<div class="subtitle">
Booking Mudah • Cepat • Aman
</div>

</div>
</header>

<section class="container">

<div class="card">

<h2>Form Booking</h2>

<form id="bookingForm">

<div class="row">

<div class="input-group">

<label>Nama Depan</label>

<input
type="text"
id="firstname"
required>

</div>

<div class="input-group">

<label>Nama Belakang</label>

<input
type="text"
id="lastname"
required>

</div>

</div>

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
required>

</div>

<div class="input-group">

<label>Nomor WhatsApp</label>

<input
type="tel"
id="phone"
required>

</div>

<div class="input-group">

<label>Kota</label>

<select id="city">

<option>Jakarta</option>

<option>Bandung</option>

<option>Yogyakarta</option>

<option>Semarang</option>

<option>Surabaya</option>

<option>Bali</option>

<option>Medan</option>

<option>Makassar</option>

</select>

</div>

<div class="input-group">

<label>Nama Hotel</label>

<input
type="text"
id="hotel"
placeholder="Contoh: RedDoorz Near Malioboro"
required>

</div>

<div class="row">

<div class="input-group">

<label>Check In</label>

<input
type="date"
id="checkin"
required>

</div>

<div class="input-group">

<label>Check Out</label>

<input
type="date"
id="checkout"
required>

</div>

</div>

<div class="row">

<div class="input-group">

<label>Jumlah Kamar</label>

<input
type="number"
id="room"
value="1"
min="1">

</div>

<div class="input-group">

<label>Jumlah Tamu</label>

<input
type="number"
id="guest"
value="2"
min="1">

</div>

</div>

<div class="input-group">

<label>Catatan</label>

<textarea
id="note"
rows="4"
placeholder="Permintaan khusus (opsional)"></textarea>

</div>

<button
type="button"
id="checkoutButton">

Checkout via WhatsApp

</button>

</form>

</div>

</section>

<footer>

<p>

© 2026 Booking Hotel

</p>

</footer>

<script src="script.js"></script>

</body>
</html>
